<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">飞书多维表格接入流程图</title>
  <desc id="desc">从创建应用到授权文档，再到工具写入表格的六步流程。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#25231e" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="980" height="360" rx="28" fill="#f7f7f4"/>
  <path d="M32 70 C210 18 326 120 500 70 C670 22 760 86 948 42" fill="none" stroke="#d8d4c8" stroke-width="2" stroke-dasharray="7 8"/>
  <text x="34" y="46" fill="#f54e00" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13" font-weight="800" letter-spacing="2">FEISHU SETUP MAP</text>
  <text x="34" y="86" fill="#25231e" font-family="Arial, Microsoft YaHei, sans-serif" font-size="42" font-weight="900">从飞书到多维表格</text>
  <text x="36" y="117" fill="#6b675f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">完成一次后，后续使用者只需要粘贴链接、运行评测、查看写入状态。</text>

  <g filter="url(#shadow)">
    <rect x="34" y="158" width="132" height="112" rx="18" fill="#ffffff" stroke="#d8d4c8"/>
    <circle cx="64" cy="188" r="18" fill="#25231e"/>
    <text x="58" y="193" fill="#f7f7f4" font-family="Arial, sans-serif" font-size="14" font-weight="800">01</text>
    <text x="52" y="228" fill="#25231e" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">创建应用</text>
    <text x="52" y="252" fill="#6b675f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">企业自建应用</text>

    <rect x="190" y="158" width="132" height="112" rx="18" fill="#ffffff" stroke="#d8d4c8"/>
    <circle cx="220" cy="188" r="18" fill="#25231e"/>
    <text x="214" y="193" fill="#f7f7f4" font-family="Arial, sans-serif" font-size="14" font-weight="800">02</text>
    <text x="208" y="228" fill="#25231e" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">复制凭证</text>
    <text x="208" y="252" fill="#6b675f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">App ID / Secret</text>

    <rect x="346" y="158" width="132" height="112" rx="18" fill="#ffffff" stroke="#d8d4c8"/>
    <circle cx="376" cy="188" r="18" fill="#25231e"/>
    <text x="370" y="193" fill="#f7f7f4" font-family="Arial, sans-serif" font-size="14" font-weight="800">03</text>
    <text x="364" y="228" fill="#25231e" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">开通权限</text>
    <text x="364" y="252" fill="#6b675f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">Bitable / Wiki</text>

    <rect x="502" y="158" width="132" height="112" rx="18" fill="#ffffff" stroke="#d8d4c8"/>
    <circle cx="532" cy="188" r="18" fill="#25231e"/>
    <text x="526" y="193" fill="#f7f7f4" font-family="Arial, sans-serif" font-size="14" font-weight="800">04</text>
    <text x="520" y="228" fill="#25231e" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">发布版本</text>
    <text x="520" y="252" fill="#6b675f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">权限正式生效</text>

    <rect x="658" y="158" width="132" height="112" rx="18" fill="#ffffff" stroke="#d8d4c8"/>
    <circle cx="688" cy="188" r="18" fill="#25231e"/>
    <text x="682" y="193" fill="#f7f7f4" font-family="Arial, sans-serif" font-size="14" font-weight="800">05</text>
    <text x="676" y="228" fill="#25231e" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">添加文档</text>
    <text x="676" y="252" fill="#6b675f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">表格应用可编辑</text>

    <rect x="814" y="158" width="132" height="112" rx="18" fill="#fff0e7" stroke="#f54e00"/>
    <circle cx="844" cy="188" r="18" fill="#f54e00"/>
    <text x="838" y="193" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="800">06</text>
    <text x="832" y="228" fill="#25231e" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">工具写入</text>
    <text x="832" y="252" fill="#6b675f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">字段检查后同步</text>
  </g>

  <g stroke="#bdb7aa" stroke-width="2" stroke-linecap="round">
    <path d="M166 214 H190"/>
    <path d="M322 214 H346"/>
    <path d="M478 214 H502"/>
    <path d="M634 214 H658"/>
    <path d="M790 214 H814"/>
  </g>
  <g fill="#bdb7aa">
    <path d="M185 208 L193 214 L185 220 Z"/>
    <path d="M341 208 L349 214 L341 220 Z"/>
    <path d="M497 208 L505 214 L497 220 Z"/>
    <path d="M653 208 L661 214 L653 220 Z"/>
    <path d="M809 208 L817 214 L809 220 Z"/>
  </g>

  <rect x="34" y="302" width="912" height="28" rx="14" fill="#e7e3d8"/>
  <text x="54" y="321" fill="#514d45" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13" font-weight="700">提示：截图附件上传是可选项，视频默认只保存在本地证据文件夹。</text>
</svg>
